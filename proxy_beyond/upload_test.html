<!doctype html>
<html lang="ko">
<meta charset="utf-8">
<title>Plan A 업로드 테스트</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;line-height:1.6}</style>
<h2>Plan A 파일 업로드 테스트</h2>
<p>아래에서 아무 파일이나 고르고 <b>업로드</b>를 누르면
<code>https://httpbin.org/post</code> 로 multipart 업로드됩니다.</p>
<p>→ 프록시 콘솔 창에 <b>*** FILE UPLOAD DETECTED</b> 와 파일 이름이 뜨면 성공.</p>
<form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">
  <p><input type="file" name="myfile"></p>
  <p><button type="submit">업로드</button></p>
</form>
</html>
